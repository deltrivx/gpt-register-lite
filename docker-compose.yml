services:
  gpt-register-lite:
    build: .
    image: gpt-register-lite:local
    container_name: gpt-register-lite
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      HOST: 0.0.0.0
      PORT: 8765
      DATA_DIR: /data
      # Prefer env-injected CF temp mail (gpt-mail-worker on deltrivx.ccwu.cc)
      MAIL_SOURCE: ${MAIL_SOURCE:-cf_temp}
      CF_API_URL: ${CF_API_URL:-https://gpt-mail.deltrivx.ccwu.cc}
      CF_DOMAIN: ${CF_DOMAIN:-deltrivx.ccwu.cc}
      CF_ADMIN_TOKEN: ${CF_ADMIN_TOKEN:-}
      PROXY: ${PROXY:-}
    volumes:
      - ./data:/data
    # Optional: host proxy for registration egress
    # network_mode: bridge
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/', timeout=5)",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 40s
